<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="login-overlay">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand">Retail Insights</span>
      </div>

      <div id="login-pane">
        <h2 class="login-title">Welcome back</h2>
        <p class="login-sub">Sign in to access your retail dashboard.</p>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="input-field" type="text" id="login-username" autocomplete="username" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="input-field" type="password" id="login-password" autocomplete="current-password" placeholder="Enter password">
        </div>
        <div id="login-error" class="auth-error" style="display:none;"></div>
        <button id="login-btn" class="btn-primary" style="width:100%;justify-content:center;">Sign in</button>
        <p class="auth-switch">New retailer? <a href="#" id="go-register">Create an account</a></p>
      </div>

      <div id="register-pane" style="display:none;">
        <h2 class="login-title">Create account</h2>
        <p class="login-sub">Register to access your retail dashboard.</p>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="input-field" type="text" id="reg-username" autocomplete="username" placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="input-field" type="password" id="reg-password" autocomplete="new-password" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="input-field" type="password" id="reg-confirm" autocomplete="new-password" placeholder="Repeat your password">
        </div>
        <div id="register-error" class="auth-error" style="display:none;"></div>
        <button id="register-btn" class="btn-primary" style="width:100%;justify-content:center;">Create account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="go-login">Sign in</a></p>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <nav id="sidebar">
      <div class="sidebar-header">
        <span class="brand">Retail Insights</span>
      </div>
      <ul class="nav-links">
        <li>
          <a href="#dashboard" class="nav-link">
            <span class="material-symbols-outlined">grid_view</span>
            Dashboard
          </a>
        </li>
        <li>
          <a href="#update-data" class="nav-link">
            <span class="material-symbols-outlined">upload_file</span>
            Update Data
          </a>
        </li>
      </ul>
    </nav>

    <div id="content-area">
      <header id="topbar">
        <h2 id="page-title">Dashboard Overview</h2>
        <div id="user-chip">
          <span class="material-symbols-outlined" style="font-size:16px;color:var(--on-surface-variant);">person</span>
          <span id="topbar-username"></span>
          <button id="logout-btn">Sign out</button>
        </div>
      </header>
      <main id="page"></main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
